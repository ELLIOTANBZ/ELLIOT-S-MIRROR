{% extends "base.html" %}
{% block content %}
<section class="login-panel">
  <div>
    <div class="brand-mark large">M</div>
    <h1>MIRROR</h1>
    <p>Signed in from Windows as {{ windows_username }}.</p>
  </div>
  {% if can_choose_admin %}
    <div class="form-card">
      <form method="post">
        <input type="hidden" name="action" value="windows_login">
        <button type="submit">Continue as {{ windows_username }}</button>
      </form>
      <hr>
      <form method="post">
        <input type="hidden" name="action" value="admin_login">
        <label>Admin Username
          <input name="username" autocomplete="username" required>
        </label>
        <label>Admin Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Sign In as Admin</button>
      </form>
    </div>
  {% else %}
    <div class="form-card">
      <p class="muted">MIRROR will sign you in automatically when your Windows username matches an officer account.</p>
    </div>
  {% endif %}
</section>
{% endblock %}
