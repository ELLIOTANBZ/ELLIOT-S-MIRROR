{% extends "base.html" %}
{% block content %}
<section class="login-panel">
  <div>
    <div class="brand-mark large">M</div>
    <h1>MIRROR</h1>
    <p>Signed in from Windows as {{ windows_username }}.</p>
  </div>
  {% if can_choose_admin %}
    <div class="form-card">
      <form method="post">
        <input type="hidden" name="action" value="windows_login">
        <button type="submit">{{ windows_username }}</button>
      </form>
      <form method="post">
        <input type="hidden" name="action" value="admin_login">
        <button type="submit">Admin</button>
      </form>
    </div>
  {% else %}
    <form method="post" class="form-card">
      <input type="hidden" name="action" value="windows_login">
      <button type="submit">{{ windows_username }}</button>
    </form>
  {% endif %}
</section>
{% endblock %}
